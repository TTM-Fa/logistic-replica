<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 1.5rem;
      color: #1a2b4a;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      color: #6b7a8d;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #0063a3;
      box-shadow: 0 0 0 3px rgba(0,99,163,0.12);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0063a3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.2s;
    }
    button:hover { background: #004d80; }
    button:disabled { background: #93c5e4; cursor: not-allowed; }
    .error {
      color: #dc2626;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 14px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <form class="login-card" id="form">
    <h1>Logistics Platform</h1>
    <p class="subtitle">Enter the access password to continue</p>
    <label for="pw">Password</label>
    <input type="password" id="pw" name="password" autocomplete="current-password" autofocus required>
    <button type="submit" id="btn">Sign in</button>
    <p class="error" id="err"></p>
  </form>
  <script>
    const form = document.getElementById('form');
    const pw = document.getElementById('pw');
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in\u2026';
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw.value }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          err.textContent = data.error || 'Access denied';
        }
      } catch {
        err.textContent = 'Network error. Try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
